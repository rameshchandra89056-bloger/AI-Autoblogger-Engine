name: AI Auto-Blogger Engine 🤖

# Yeh hai hamara automatic alarm (Triggers)
on:
  workflow_dispatch: # Hath se chalane wala button
  schedule:
    # Subah 8:00 baje (IST)
    - cron: '30 2 * * *'
    # Shaam 6:00 baje (IST)
    - cron: '30 12 * * *'

permissions:
  contents: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Repository ka code la rahe hain...
        uses: actions/checkout@v3

      - name: 🐍 Python chaloo kar rahe hain...
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Zaroori Libraries Install kar rahe hain (Error Fix)
        run: |
          python -m pip install --upgrade pip
          pip install requests edge-tts

      - name: 🚀 AI Robot ko jaga rahe hain (main.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 💾 Naya blog website par save (Commit) kar rahe hain...
        run: |
          git config --global user.name "AI Robot"
          git config --global user.email "bot@digitalkamai.com"
          git add .
          git commit -m "🤖 Auto-published new blog via Engine v18.0" || echo "No changes to commit"
          git push
          
