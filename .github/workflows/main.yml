name: Auto Blogger Engine

# यह टाइमर रोज़ सुबह चलेगा (UTC टाइम के हिसाब से)
on:
  schedule:
    - cron: '30 2 * * *' # भारतीय समयानुसार यह रोज़ सुबह लगभग 8:00 बजे ट्रिगर होगा
  workflow_dispatch: # यह बटन आपको मैन्युअल रन करने की ताक़त देगा

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: इंसानी देरी (Random Delay for Google AdSense)
        run: |
          echo "इंसान की तरह एक्टिंग कर रहे हैं..."
          sleep $((RANDOM % 3600)) # 0 से 60 मिनट के बीच कभी भी रन होगा

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run AI Engine
        run: python main.py

      - name: Save New HTML File to GitHub
        run: |
          git config --global user.name "AI Autoblogger"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-generated new blog post" || echo "No changes to commit"
          git push
          
