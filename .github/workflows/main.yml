name: Auto Blogger Engine

on:
  push:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run AI Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save New HTML File to GitHub
        run: |
          git config --global user.name "AI Autoblogger"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-generated new blog post" || echo "No changes to commit"
          git push
          
